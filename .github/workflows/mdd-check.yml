name: Daily MDD Check

on:
  schedule:
    # Run once daily at 22:00 UTC (post-market, US market closes ~21:00 UTC)
    - cron: "0 22 * * 1-5"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  mdd-check:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GIST_PAT: ${{ secrets.GIST_PAT }}
      GIST_ID: ${{ secrets.GIST_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install .

      - name: Restore PortfoTrack context
        env:
          PORTFOTRACK_CONTEXT_B64: ${{ secrets.PORTFOTRACK_CONTEXT_B64 }}
        run: |
          if [ -n "$PORTFOTRACK_CONTEXT_B64" ]; then
            umask 077
            printf '%s' "$PORTFOTRACK_CONTEXT_B64" \
              | base64 --decode > config/portfotrack_context.json
          fi

      - name: Run MDD check
        run: python src/main.py
