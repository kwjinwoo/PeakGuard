# PeakGuard Portfolio Configuration
# Each entry maps a ticker symbol to its MDD alert threshold (%).

tickers:
  # Individual tech stocks
  AMZN:
    name: "Amazon"
    threshold: 15.0
  MSFT:
    name: "Microsoft"
    threshold: 15.0
  META:
    name: "Meta"
    threshold: 15.0
  NVDA:
    name: "Nvidia"
    threshold: 15.0
  GOOGL:
    name: "Google"
    threshold: 15.0

# Global alert thresholds for conditional metric alerts
alert_thresholds:
  days_since_ath_limit: 180
  zscore_threshold: -2.0
  bounce_from_bottom_min: 3.0
