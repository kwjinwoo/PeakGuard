  AMZN:
    name: "Amazon"
    threshold: 15.0
  MSFT:
    name: "Microsoft"
    threshold: 15.0
  META:
    name: "Meta"
    threshold: 15.0
  NVDA:
    name: "Nvidia"
    threshold: 15.0
  GOOGL:
    name: "Google"
    threshold: 15.0

  # Korean ETFs (KRX)
  "360750.KS":
    name: "TIGER 미국S&P500"
    threshold: 15.0
    currency: KRW
  "133690.KS":
    name: "TIGER 미국나스닥100"
